info:
  name: POST product
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/product"
  body:
    type: json
    data: |-
      {
        "name": "Testprodult",
        "description": "Testbeschreibung",
        "price": 2.00,
        "category": "SNACK",
        "stock": 100,
        "container": {
          "name": "Testproduktcontainer",
          "description": "Testbeschreibung container",
          "category": "SNACK",
          "capacity": 12,
          "stock": 2
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/product"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "description": "",
            "price": 0,
            "category": "SNACK",
            "stock": 0,
            "container": {
              "name": "",
              "description": "",
              "category": "SNACK",
              "capacity": 0,
              "stock": 0
            }
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "id": 0,
            "name": "",
            "description": "",
            "price": 0,
            "category": "SNACK",
            "stock": 0,
            "container": {
              "id": 0,
